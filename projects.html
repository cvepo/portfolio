<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>projects — enzo hiu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --transition: 0.2s ease; }

[data-theme="dark"] {
  --bg: #111110;
  --bg2: #161615;
  --surface: #1c1c1a;
  --surface2: #222220;
  --border: #2a2a27;
  --border-strong: #3a3a36;
  --text: #eeede8;
  --text-2: #a8a8a0;
  --text-3: #5a5a54;
  --tag-blue-bg: #0e1e35; --tag-blue: #6aabf7;
  --tag-green-bg: #0d2018; --tag-green: #5cc98a;
  --tag-amber-bg: #251a08; --tag-amber: #f0a840;
  --tag-purple-bg: #1a1530; --tag-purple: #a48ef5;
  --tag-teal-bg: #0a2022; --tag-teal: #4dcbb8;
  --tag-pink-bg: #281020; --tag-pink: #f07ab8;
  --tag-red-bg: #301418; --tag-red: #e87070;
  --shadow-card: 0 1px 4px rgba(0,0,0,0.5), 0 8px 24px rgba(0,0,0,0.35);
  --shadow-card-hover: 0 2px 10px rgba(0,0,0,0.6), 0 20px 48px rgba(0,0,0,0.45);
  --shadow-panel: -8px 0 40px rgba(0,0,0,0.5);
}
[data-theme="light"] {
  --bg: #f9f9f8;
  --bg2: #f4f4f2;
  --surface: #f1f0ef;
  --surface2: #eae9e6;
  --border: #e3e2df;
  --border-strong: #c8c7c4;
  --text: #1a1a18;
  --text-2: #4a4a47;
  --text-3: #888884;
  --tag-blue-bg: #e8f1fb; --tag-blue: #2a6db5;
  --tag-green-bg: #e6f4ec; --tag-green: #2a7a4a;
  --tag-amber-bg: #fef3e2; --tag-amber: #a06020;
  --tag-purple-bg: #f0eefb; --tag-purple: #5a42b5;
  --tag-teal-bg: #e4f5f2; --tag-teal: #1e7a6a;
  --tag-pink-bg: #fceef5; --tag-pink: #b0387a;
  --tag-red-bg: #fce8e8; --tag-red: #b83232;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.06);
  --shadow-card-hover: 0 2px 8px rgba(0,0,0,0.1), 0 12px 32px rgba(0,0,0,0.1);
  --shadow-panel: -8px 0 40px rgba(0,0,0,0.1);
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.65;
  transition: background var(--transition), color var(--transition);
}

/* ── SIDENAV ── */
.sidenav {
  position: fixed; top: 0; left: 0; bottom: 0; width: 192px;
  padding: 48px 0 40px 28px; display: flex; flex-direction: column;
  border-right: 1px solid var(--border); background: var(--bg);
  transition: background var(--transition), border-color var(--transition); z-index: 400;
}
.nav-name { font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); text-decoration: none; letter-spacing: -0.02em; margin-bottom: 40px; }
.nav-links { list-style: none; display: flex; flex-direction: column; gap: 10px; flex: 1; }
.nav-block { display: flex; flex-direction: column; gap: 4px; }
.nav-sub { list-style: none; margin: 0; padding: 0 0 0 12px; border-left: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; }
.nav-links a { font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--text-3); text-decoration: none; letter-spacing: -0.01em; padding: 5px 0; display: flex; align-items: center; gap: 8px; transition: color 0.15s; }
.nav-links a::before { content: ''; width: 0; height: 1px; background: currentColor; transition: width 0.2s ease; flex-shrink: 0; }
.nav-links a:hover { color: var(--text); }
.nav-links a:hover::before, .nav-links a.active::before { width: 14px; }
.nav-links a.active { color: var(--text); }
.nav-main-link { font-weight: 500; color: var(--text-2); }
.nav-main-link.active { color: var(--text); }
.nav-sub a { font-size: 11px; }
.page-projects .nav-sub { display: none; }
.page-projects .nav-main-link { color: var(--text-3); }
.page-projects .nav-main-link:hover { color: var(--text); }
.page-projects .nav-projects-item a.active,
.page-projects .nav-wip-item a.active { color: var(--text); }
.nav-bottom { margin-top: auto; padding-top: 32px; }
.theme-btn { background: none; border: 1px solid var(--border); color: var(--text-3); font-family: 'Geist Mono', monospace; font-size: 11px; padding: 6px 10px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 6px; letter-spacing: 0.02em; transition: color 0.15s, border-color 0.15s, background 0.15s; }
.theme-btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface); }

/* ── SCENE ── */
.scene-wrap { position: fixed; top: 0; left: 192px; right: 0; bottom: 0; overflow: hidden; z-index: 1; }
.scene { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: grab; user-select: none; position: relative; }
.scene:active { cursor: grabbing; }

.drag-hint { position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%); font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-3); letter-spacing: 0.05em; pointer-events: none; display: flex; align-items: center; gap: 10px; transition: opacity 0.7s ease; white-space: nowrap; z-index: 10; opacity: 0; }
.hint-arrow { flex-shrink: 0; display: block; color: var(--text-3); opacity: 0.9; }
.hint-arrow path { stroke: currentColor; }

/* ── CARDS ── */
.card { position: absolute; width: 256px; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 22px 22px 18px; cursor: pointer; will-change: transform, opacity; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s; box-shadow: var(--shadow-card); z-index: 1; }
.card:hover { border-color: var(--border-strong); background: var(--surface); box-shadow: var(--shadow-card-hover); }
.card-tag { display: inline-flex; align-items: center; font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.03em; padding: 2px 8px; border-radius: 4px; margin-bottom: 11px; }
.card-title { font-family: 'Instrument Serif', serif; font-size: 17px; font-weight: 400; color: var(--text); margin-bottom: 8px; line-height: 1.3; }
.card-desc { font-size: 12px; color: var(--text-2); line-height: 1.6; margin-bottom: 13px; }
.card-stack { display: flex; flex-wrap: wrap; gap: 4px; }
.stack-pill { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text-3); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; }
.card-arrow { position: absolute; top: 16px; right: 18px; font-size: 11px; color: var(--text-3); transition: color 0.15s, transform 0.15s, opacity 0.2s ease; opacity: 0; pointer-events: none; }
.card--primed .card-arrow { opacity: 1; }
.card--primed:hover .card-arrow { color: var(--text-2); transform: translate(2px,-2px); }

/* tag colour classes — add more as needed */
.t-green  { background: var(--tag-green-bg);  color: var(--tag-green); }
.t-purple { background: var(--tag-purple-bg); color: var(--tag-purple); }
.t-amber  { background: var(--tag-amber-bg);  color: var(--tag-amber); }
.t-blue   { background: var(--tag-blue-bg);   color: var(--tag-blue); }
.t-teal   { background: var(--tag-teal-bg);   color: var(--tag-teal); }
.t-pink   { background: var(--tag-pink-bg);   color: var(--tag-pink); }
.t-red    { background: var(--tag-red-bg);    color: var(--tag-red); }

/* ── PANEL ── */
.panel-scrim { position: fixed; inset: 0 0 0 192px; pointer-events: none; z-index: 350; }
.panel-scrim.open { pointer-events: all; }
.panel { position: absolute; top: 0; right: 0; bottom: 0; width: 440px; background: var(--bg); border-left: 1px solid var(--border); box-shadow: var(--shadow-panel); transform: translateX(100%); transition: transform 0.38s cubic-bezier(0.16,1,0.3,1); display: flex; flex-direction: column; overflow-y: auto; z-index: 1; }
.panel.open { transform: translateX(0); }
.panel-body-wrap { padding: 52px 36px 52px; flex: 1; }
.panel-close { position: absolute; top: 20px; right: 22px; background: none; border: 1px solid var(--border); color: var(--text-3); font-family: 'Geist Mono', monospace; font-size: 11px; padding: 5px 9px; border-radius: 6px; cursor: pointer; letter-spacing: 0.02em; transition: color 0.15s, border-color 0.15s, background 0.15s; }
.panel-close:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface); }
.panel-tag { display: inline-flex; align-items: center; font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.03em; padding: 2px 8px; border-radius: 4px; margin-bottom: 16px; }
.panel-title { font-family: 'Instrument Serif', serif; font-size: 34px; font-weight: 400; line-height: 1.12; margin-bottom: 10px; letter-spacing: -0.02em; }
.panel-subtitle { font-size: 14px; color: var(--text-2); line-height: 1.7; margin-bottom: 28px; }
.panel-divider { height: 1px; background: var(--border); margin: 24px 0; }
.panel-section-label { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text-3); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 12px; }
.panel-text { font-size: 14px; color: var(--text-2); line-height: 1.8; margin-bottom: 20px; }
.panel-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
.meta-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.meta-cell-label { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
.meta-cell-value { font-size: 13px; color: var(--text-2); }
.panel-highlight { border-left: 2px solid var(--border-strong); border-radius: 0 8px 8px 0; padding: 14px 18px; background: var(--surface); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.panel-highlight-label { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--text-3); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 7px; }
.panel-highlight-text { font-size: 13px; color: var(--text-2); line-height: 1.7; }
.panel-stack { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }
.panel-pill { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-2); border: 1px solid var(--border); border-radius: 4px; padding: 3px 9px; background: var(--surface); transition: border-color 0.15s; }
.panel-pill:hover { border-color: var(--border-strong); }
.panel-links { display: flex; gap: 8px; flex-wrap: wrap; }
.panel-link { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--text-2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; background: var(--surface); text-decoration: none; letter-spacing: -0.01em; display: inline-flex; align-items: center; gap: 5px; transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.15s; }
.panel-link:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface2); transform: translateY(-1px); }

@media (max-width: 768px) {
  .sidenav { display: none; }
  .scene-wrap { left: 0; }
  .panel { width: 100%; }
  .panel-scrim { left: 0; }
}
</style>

<script>
// theme — runs immediately to avoid flash
const html  = document.documentElement;
const label = document.getElementById("themeLabel");
function applyTheme(t) {
  html.setAttribute("data-theme", t);
  label.textContent = t === "dark" ? "light" : "dark";
  try { localStorage.setItem("theme", t); } catch(_) {}
}
const _saved = (() => { try { return localStorage.getItem("theme"); } catch(_) { return null; } })();
applyTheme(_saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
document.getElementById("themeToggle").addEventListener("click", () => {
  applyTheme(html.getAttribute("data-theme") === "dark" ? "light" : "dark");
});

// load projects.json and boot (pad to 10 cards for layout preview — cycle real entries)
fetch("projects.json")
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then((data) => {
    if (!data.length) throw new Error("no projects");
    const n = 10;
    const padded = Array.from({ length: n }, (_, i) => data[i % data.length]);
    boot(padded);
  })
  .catch(err => {
    console.error("projects.json load error:", err);
  });

function boot(PROJECTS) {
  const scene = document.getElementById("scene");
  const hint  = document.getElementById("drag-hint");
  const scrim = document.getElementById("panel-scrim");
  const panel = document.getElementById("panel");
  const pbody = document.getElementById("panel-body");

  const DRAG_ACCEL = 0.22;
  const FRICTION = 0.935;
  const MAX_VEL = 0.055;
  const DRAG_SCALE = 0.006;

  /** Delay before the entrance timeline starts so layout/paint can settle (reduces rAF clumping). */
  const ANIMATION_PREROLL_MS = 220;
  const bootT0 = performance.now() + ANIMATION_PREROLL_MS;
  const CARD_ENTER_MS = 800;
  const CARD_STAGGER_MS = 140;
  const CARD_FIRST_MS = 150;
  const HINT_AFTER_LAST_MS = 200;
  const HINT_FADE_MS = 500;

  function cubicBezierXY(x1, y1, x2, y2) {
    function sampleX(t) {
      return 3 * (1 - t) * (1 - t) * t * x1 + 3 * (1 - t) * t * t * x2 + t * t * t;
    }
    function sampleY(t) {
      return 3 * (1 - t) * (1 - t) * t * y1 + 3 * (1 - t) * t * t * y2 + t * t * t;
    }
    return function (x) {
      if (x <= 0) return 0;
      if (x >= 1) return 1;
      let lo = 0, hi = 1;
      for (let i = 0; i < 14; i++) {
        const mid = (lo + hi) * 0.5;
        if (sampleX(mid) < x) lo = mid;
        else hi = mid;
      }
      const t = (lo + hi) * 0.5;
      return sampleY(t);
    };
  }
  const enterEaseY = cubicBezierXY(0.22, 1, 0.36, 1);
  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  const lastCardLandMs = PROJECTS.length > 0
    ? CARD_FIRST_MS + (PROJECTS.length - 1) * CARD_STAGGER_MS + CARD_ENTER_MS
    : 0;
  const hintRevealAt = bootT0 + lastCardLandMs + HINT_AFTER_LAST_MS;

  let angle = 0, vel = 0, targetVel = 0, isDragging = false, lastX = 0, hintGone = false, panelOpen = false;
  let dragMoved = false;
  let dragStartX = 0;
  const DRAG_MOVE_PX = 6;

  let seekActive = false;
  let seekBase = 0;
  let seekEntryAbsErr = 0.5;
  let pendingSeekProject = null;
  let primedBase = null;
  let primedProject = null;
  const FRONT_DEPTH = 0.86;
  const SEEK_KP = 0.019;
  const SEEK_MAX_VEL = 0.048;
  const SEEK_SMOOTH = 0.13;
  const SEEK_BELL_FLOOR = 0.2;
  const SEEK_SETTLE_ERR = 0.078;
  const SEEK_SETTLE_LERP = 0.22;
  const SEEK_SETTLE_DAMP = 0.86;
  const SEEK_SNAP_ERR = 0.0004;
  const SEEK_SNAP_VEL = 0.0011;

  function clampVel(v) {
    return Math.max(-MAX_VEL, Math.min(MAX_VEL, v));
  }
  function clampSeekVel(v) {
    return Math.max(-SEEK_MAX_VEL, Math.min(SEEK_MAX_VEL, v));
  }

  function wrapAnglePi(x) {
    const T = Math.PI * 2;
    x = ((x + Math.PI) % T + T) % T - Math.PI;
    return x;
  }

  /** Shortest delta to add to `angle` so this card's orbit angle (angle + base) is 0 mod 2π (front). */
  function angleDeltaToFront(baseForCard) {
    return wrapAnglePi(-(angle + baseForCard));
  }

  const W    = () => scene.offsetWidth;
  const H    = () => scene.offsetHeight;
  const nOrbit = PROJECTS.length;
  const CARD_WIDTH_PX = 256;
  function R() {
    const s = Math.min(W(), H());
    if (nOrbit <= 1) return s * 0.34;
    const minChord = CARD_WIDTH_PX * 1.14;
    const sinHalf = Math.sin(Math.PI / nOrbit);
    const fromCount = minChord / (2 * Math.max(sinHalf, 0.08));
    const minR = s * 0.28;
    const maxR = s * 0.48;
    return Math.min(maxR, Math.max(minR, fromCount));
  }
  const TILT = 0.42;

  /** Extra translateY so cards start above the viewport (not just above the orbit). */
  function entryFallOffsetPx() {
    const h = H(), cy = h * 0.5, rad = R();
    return -(h + cy + rad * TILT + 200);
  }

  window.addEventListener("resize", () => { render(); });

  function foremostCardDepth() {
    let m = -1;
    cardEls.forEach(({ base }) => {
      const d = (Math.cos(angle + base) + 1) / 2;
      if (d > m) m = d;
    });
    return m;
  }

  const cardEls = PROJECTS.map((p, i) => {
    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `
      <span class="card-tag ${p.tagClass}">${p.tag}</span>
      <div class="card-title">${p.title}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-stack">${p.stack.map(s => `<span class="stack-pill">${s}</span>`).join("")}</div>
      <span class="card-arrow">↗</span>
    `;
    el.addEventListener("click", () => {
      if (!cardEls.every(c => c.entry.phase === "done")) return;
      if (Math.abs(vel) > 0.016 && !seekActive) return;
      const a = angle + base;
      const depth = (Math.cos(a) + 1) / 2;
      const maxD = foremostCardDepth();
      const atFront = depth >= maxD - 0.004 && depth >= FRONT_DEPTH;

      if (primedBase === base && atFront) {
        openPanel(p);
        primedBase = null;
        primedProject = null;
        return;
      }

      primedBase = null;
      primedProject = null;

      if (atFront) {
        primedBase = base;
        primedProject = p;
        return;
      }

      seekBase = base;
      pendingSeekProject = p;
      seekActive = true;
      targetVel = 0;
      seekEntryAbsErr = Math.max(0.32, Math.abs(angleDeltaToFront(base)));
    });
    scene.appendChild(el);
    const base = (i / PROJECTS.length) * Math.PI * 2;
    const startAt = bootT0 + CARD_FIRST_MS + i * CARD_STAGGER_MS;
    return { el, base, entry: { phase: "wait", startAt, t0: 0 } };
  });

  function render() {
    const now = performance.now();
    const cx = W() / 2, cy = H() / 2, r = R();
    const fallFrom = entryFallOffsetPx();

    if (!hintGone) {
      if (now < hintRevealAt) {
        hint.style.transition = "none";
        hint.style.opacity = "0";
      } else {
        const ht = Math.min(1, (now - hintRevealAt) / HINT_FADE_MS);
        hint.style.transition = "none";
        hint.style.opacity = String(easeOutCubic(ht));
        if (ht >= 1) hint.style.transition = "opacity 0.7s ease";
      }
    }

    let maxDepth = -1;
    cardEls.forEach(({ base }) => {
      const d = (Math.cos(angle + base) + 1) / 2;
      if (d > maxDepth) maxDepth = d;
    });

    cardEls.forEach(({ el, base, entry }) => {
      const a     = angle + base;
      const depth = (Math.cos(a) + 1) / 2;
      const orbitX = Math.sin(a) * r;
      const orbitY = Math.cos(a) * r * TILT;
      const scale = (0.68 + 0.32 * depth).toFixed(3);
      const depthOpacity = 0.3 + 0.7 * depth;

      let entryY = 0;
      let opacityMul = 1;

      if (entry.phase === "wait") {
        if (now >= entry.startAt) {
          entry.phase = "run";
          entry.t0 = now;
        } else {
          entryY = fallFrom;
          opacityMul = 0;
        }
      }
      if (entry.phase === "run") {
        const t = Math.min(1, (now - entry.t0) / CARD_ENTER_MS);
        const easedDrop = enterEaseY(t);
        entryY = fallFrom * (1 - easedDrop);
        opacityMul = easeOutCubic(t);
        if (t >= 1) entry.phase = "done";
      }

      el.style.left      = cx + "px";
      el.style.top       = cy + "px";
      el.style.transform = `translate(calc(-50% + ${orbitX}px), calc(-50% + ${orbitY + entryY}px)) scale(${scale})`;
      el.style.opacity   = (depthOpacity * opacityMul).toFixed(3);
      el.style.zIndex    = Math.round(depth * 100);
      const isForemost = depth >= maxDepth - 0.004;
      const showPrimed = primedBase === base && isForemost && depth >= FRONT_DEPTH && entry.phase === "done";
      el.classList.toggle("card--primed", showPrimed);
    });
  }

  (function loop() {
    if (isDragging && dragMoved) {
      vel += (targetVel - vel) * DRAG_ACCEL;
      vel = clampVel(vel);
    } else if (seekActive) {
      const err = angleDeltaToFront(seekBase);
      if (Math.abs(err) < SEEK_SNAP_ERR && Math.abs(vel) < SEEK_SNAP_VEL) {
        angle -= angle + seekBase;
        vel = 0;
        targetVel = 0;
        seekActive = false;
        if (pendingSeekProject) {
          primedBase = seekBase;
          primedProject = pendingSeekProject;
          pendingSeekProject = null;
        }
      } else if (Math.abs(err) < SEEK_SETTLE_ERR) {
        vel *= SEEK_SETTLE_DAMP;
        targetVel *= SEEK_SETTLE_DAMP;
        angle += err * SEEK_SETTLE_LERP;
      } else {
        const span = Math.max(seekEntryAbsErr, 0.12);
        const t = 1 - Math.min(1, Math.abs(err) / span);
        const bell = 4 * t * (1 - t);
        const speedMul = SEEK_BELL_FLOOR + (1 - SEEK_BELL_FLOOR) * bell;
        const gain = SEEK_KP * speedMul;
        targetVel = clampSeekVel(err * gain);
        vel += (targetVel - vel) * SEEK_SMOOTH;
        vel = clampSeekVel(vel);
      }
    } else {
      vel *= FRICTION;
    }
    angle += vel;
    render();
    requestAnimationFrame(loop);
  })();

  scene.addEventListener("mousedown", e => {
    if (e.target.closest(".panel,.panel-close")) return;
    const onCard = !!e.target.closest(".card");
    if (!onCard) {
      seekActive = false;
      pendingSeekProject = null;
      primedBase = null;
      primedProject = null;
    }
    isDragging = true;
    dragMoved = false;
    dragStartX = e.clientX;
    lastX = e.clientX;
    targetVel = 0;
    fadeHint();
  });
  window.addEventListener("mousemove", e => {
    if (!isDragging) return;
    if (!dragMoved && Math.abs(e.clientX - dragStartX) > DRAG_MOVE_PX) {
      dragMoved = true;
      seekActive = false;
      pendingSeekProject = null;
      primedBase = null;
      primedProject = null;
    }
    if (!dragMoved) return;
    const dx = e.clientX - lastX;
    lastX = e.clientX;
    targetVel = clampVel(dx * DRAG_SCALE);
  });
  window.addEventListener("mouseup", () => { isDragging = false; dragMoved = false; });

  scene.addEventListener("touchstart", e => {
    if (e.target.closest(".panel,.panel-close")) return;
    const onCard = !!e.target.closest(".card");
    if (!onCard) {
      seekActive = false;
      pendingSeekProject = null;
      primedBase = null;
      primedProject = null;
    }
    isDragging = true;
    dragMoved = false;
    dragStartX = e.touches[0].clientX;
    lastX = e.touches[0].clientX;
    targetVel = 0;
    fadeHint();
  }, { passive: true });
  window.addEventListener("touchmove", e => {
    if (!isDragging) return;
    const x = e.touches[0].clientX;
    if (!dragMoved && Math.abs(x - dragStartX) > DRAG_MOVE_PX) {
      dragMoved = true;
      seekActive = false;
      pendingSeekProject = null;
      primedBase = null;
      primedProject = null;
    }
    if (!dragMoved) return;
    const dx = x - lastX;
    lastX = x;
    targetVel = clampVel(dx * DRAG_SCALE);
  }, { passive: true });
  window.addEventListener("touchend", () => { isDragging = false; dragMoved = false; });

  function fadeHint() {
    if (hintGone) return;
    hintGone = true;
    hint.style.transition = "opacity 0.7s ease";
    hint.style.opacity = "0";
  }

  function openPanel(p) {
    pbody.innerHTML = `
      <span class="panel-tag ${p.tagClass}">${p.tag}</span>
      <div class="panel-title">${p.title}</div>
      <div class="panel-subtitle">${p.desc}</div>
      <div class="panel-divider"></div>
      <div class="panel-section-label">about</div>
      <div class="panel-text">${p.body}</div>
      <div class="panel-highlight">
        <div class="panel-highlight-label">${p.highlight.label}</div>
        <div class="panel-highlight-text">${p.highlight.text}</div>
      </div>
      <div class="panel-divider"></div>
      <div class="panel-section-label">details</div>
      <div class="panel-meta">${p.meta.map(m => `<div class="meta-cell"><div class="meta-cell-label">${m.label}</div><div class="meta-cell-value">${m.value}</div></div>`).join("")}</div>
      <div class="panel-divider"></div>
      <div class="panel-section-label">stack</div>
      <div class="panel-stack">${p.stack.map(s => `<span class="panel-pill">${s}</span>`).join("")}</div>
      <div class="panel-divider"></div>
      <div class="panel-links">${p.links.map(l => `<a class="panel-link" href="${l.href}">${l.label}</a>`).join("")}</div>
    `;
    panel.classList.add("open");
    scrim.classList.add("open");
    panelOpen = true;
  }

  function closePanel() {
    panel.classList.remove("open"); scrim.classList.remove("open"); panelOpen = false;
    seekActive = false;
    pendingSeekProject = null;
    primedBase = null;
    primedProject = null;
    targetVel = 0;
  }
  document.getElementById("panel-close").addEventListener("click", closePanel);
  scrim.addEventListener("click", e => { if (!e.target.closest(".panel")) closePanel(); });
  window.addEventListener("keydown", e => { if (e.key === "Escape" && panelOpen) closePanel(); });
}
</script>
</body>
</html>
